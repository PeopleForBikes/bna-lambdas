name: production-deployment

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/lambda-deployment-production.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "lambdas/**"

permissions:
  # This is required for requesting the JWT.
  id-token: write
  # This is required for actions/checkout.
  contents: read

concurrency:
  # Ensure sequential run per repository, i.e. 1 deployment at a time.
  group: ${{ github.repository }}
  # Ensure new runs will wait until the lock is released.
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install cargo lambda
        run: pip install cargo-lambda

      # Configure AWS and deploy the lambdas.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ secrets.FEDERATED_GITHUB_ROLE_ARN_PRODUCTION }}
          aws-region: ${{ secrets.AWS_REGION_PRODUCTION }}

      # Build the lambdas in release mode and deploy them.
      - name: Build all lambdas
        run: cd lambdas && cargo lambda build --release
      - name: deploy lambdas
        run: |
          LAMBDAS="bna-fargate-run
          bna-fargate-status
          bna-prepare-destination
          bna-save-results
          bna-sqs-parse
          bna-teardown
          scorecard
          "
          echo $LAMBDAS \
          | xargs -n1 -t \
            cargo lambda deploy \
            --runtime provided.al2023 \
            --iam-role ${{ secrets.LAMBDA_ROLE_ARN_PRODUCTION }}
